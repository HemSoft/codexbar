# SFL V6.0.0
name: SFL Dispatcher

# Thin label-driven trigger: when sfl-issue is applied to an issue,
# validate preconditions, dispatch the processor, and consume the label.

on:
  issues:
    types: [labeled]

permissions:
  contents: read
  issues: write
  actions: write

jobs:
  dispatch:
    if: >-
      github.event.label.name == 'sfl-issue'
      && github.repository != 'relias-engineering/set-it-free-loop'
    concurrency:
      group: sfl-dispatch-${{ github.event.issue.number }}
      cancel-in-progress: false
    runs-on: ubuntu-latest
    steps:
      - name: Mint GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ vars.SFL_APP_ID }}
          private-key: ${{ secrets.SFL_APP_PRIVATE_KEY }}

      - name: Validate and dispatch
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          ISSUE_NUM: ${{ github.event.issue.number }}
        run: |
          set -euo pipefail

          # Block if issue is closed
          STATE=$(gh api "repos/${{ github.repository }}/issues/${ISSUE_NUM}" --jq '.state')
          if [ "$STATE" != "open" ]; then
            echo "Issue #${ISSUE_NUM} is ${STATE} — removing trigger label and skipping"
            gh api --method DELETE \
              "repos/${{ github.repository }}/issues/${ISSUE_NUM}/labels/sfl-issue" || true
            exit 0
          fi

          # Block if issue has exclusion labels
          LABELS=$(gh api "repos/${{ github.repository }}/issues/${ISSUE_NUM}/labels" \
            --jq '.[].name')

          for SKIP in no-agent agent:blocked; do
            if echo "$LABELS" | grep -Fxq "$SKIP"; then
              echo "Issue #${ISSUE_NUM} has ${SKIP} — removing trigger label and skipping"
              gh api --method DELETE \
                "repos/${{ github.repository }}/issues/${ISSUE_NUM}/labels/sfl-issue" || true
              exit 0
            fi
          done

          # Dispatch the processor
          if gh workflow run sfl-processor.lock.yml \
            --repo "${{ github.repository }}" \
            -f issue-number="${ISSUE_NUM}"; then
            echo "Dispatched processor for issue #${ISSUE_NUM}"
            # Mark issue as being processed
            gh api --method POST \
              "repos/${{ github.repository }}/issues/${ISSUE_NUM}/labels" \
              --input - <<< '["sfl-processing"]' > /dev/null || true
            # Consume the trigger label after successful dispatch
            gh api --method DELETE \
              "repos/${{ github.repository }}/issues/${ISSUE_NUM}/labels/sfl-issue" || true
          else
            echo "::error::Failed to dispatch processor for issue #${ISSUE_NUM}"
            # Remove the label so it can be re-applied to retry
            gh api --method DELETE \
              "repos/${{ github.repository }}/issues/${ISSUE_NUM}/labels/sfl-issue" || true
            gh api "repos/${{ github.repository }}/issues/${ISSUE_NUM}/comments" \
              --field body="⚠️ SFL Dispatcher failed to start the processor. Re-apply the \`sfl-issue\` label to retry." \
              > /dev/null || true
            exit 1
          fi
