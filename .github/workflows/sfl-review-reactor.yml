# SFL V6.0.0
name: SFL Review Reactor

# Label-driven reactor — three modes:
#
#   1. evaluate  (pull_request_review / workflow_run:CI / workflow_dispatch)
#      → Check CI + reviews + threads → sfl-done or sfl-needs-work
#
#   2. dispatch  (pull_request labeled sfl-needs-work)
#      → Guard (cap, in-flight) → dispatch Processor → sfl-processing
#
#   3. transition  (workflow_run: SFL Processor completed)
#      → Success → sfl-ready-for-review + request Copilot review
#      → Failure → sfl-needs-work (may escalate)
#
# State labels (exactly one active at a time on a PR):
#   sfl-ready-for-review  — awaiting Copilot review
#   sfl-processing        — Processor running (in-flight lock)
#   sfl-needs-work        — PR needs fixes
#   sfl-done              — all clear, ready for human merge
#
# Persistent labels: agent:pr (ownership), agent:human-required, agent:pause
#
# Copilot code review is triggered automatically by the repo's branch
# ruleset (review_on_push: true). The reactor requests it explicitly as
# a belt-and-suspenders measure after Processor completion.
#
# Human override: use workflow_dispatch to re-evaluate any PR.

on:
  pull_request:
    types: [labeled]
  pull_request_review:
    types: [submitted]
  workflow_run:
    workflows: ["CI", "SFL Processor"]
    types: [completed]
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:
    inputs:
      pr-number:
        description: PR number to re-evaluate
        required: true
        type: string
      attempt:
        description: Retry attempt counter (internal use)
        required: false
        default: "0"
        type: string

permissions:
  checks: read
  contents: read
  issues: write
  pull-requests: write
  actions: write

jobs:
  resolve:
    if: >-
      github.repository != 'relias-engineering/set-it-free-loop'
      && (
        github.event_name == 'workflow_dispatch'
        || github.event_name == 'workflow_run'
        || github.event_name == 'pull_request_review'
        || github.event_name == 'schedule'
        || (github.event_name == 'pull_request'
            && github.event.label.name == 'sfl-needs-work')
      )
    runs-on: ubuntu-latest
    outputs:
      pr_number: ${{ steps.resolve.outputs.pr_number }}
      mode: ${{ steps.resolve.outputs.mode }}
      skip: ${{ steps.resolve.outputs.skip }}
      attempt: ${{ steps.resolve.outputs.attempt }}
    steps:
      - name: Mint GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ vars.SFL_APP_ID }}
          private-key: ${{ secrets.SFL_APP_PRIVATE_KEY }}

      - name: Resolve PR number and mode
        id: resolve
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          INPUT_PR_NUMBER: ${{ github.event.inputs.pr-number }}
        run: |
          set -euo pipefail

          MODE=""
          PR_NUMBER=""

          if [ "${{ github.event_name }}" = "pull_request" ]; then
            PR_NUMBER="${{ github.event.pull_request.number }}"
            MODE="dispatch"

          elif [ "${{ github.event_name }}" = "pull_request_review" ]; then
            PR_NUMBER="${{ github.event.pull_request.number }}"
            MODE="evaluate"

          elif [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            if ! [[ "$INPUT_PR_NUMBER" =~ ^[0-9]+$ ]]; then
              echo "::error::Invalid pr-number input: must be digits only"
              exit 1
            fi
            PR_NUMBER="$INPUT_PR_NUMBER"
            MODE="evaluate"

          elif [ "${{ github.event_name }}" = "schedule" ]; then
            # Polling fallback — find any open agent:pr PR and evaluate it.
            # Catches cases where Copilot review completion triggers
            # get blocked by org actor-approval policies.
            PR_NUMBER=$(gh api "repos/${{ github.repository }}/issues?labels=agent:pr&state=open&per_page=1" \
              --jq '.[0].number // empty')
            MODE="evaluate"

          elif [ "${{ github.event_name }}" = "workflow_run" ]; then
            # Determine mode based on which workflow completed
            if [ "${{ github.event.workflow_run.name }}" = "SFL Processor" ]; then
              MODE="transition"
            else
              MODE="evaluate"
            fi

            # Resolve PR from workflow_run event
            CANDIDATE_PRS=$(jq -r '.workflow_run.pull_requests[].number // empty' "$GITHUB_EVENT_PATH")

            PR_NUMBER=""
            for CANDIDATE in $CANDIDATE_PRS; do
              HAS_LABEL=$(gh api "repos/${{ github.repository }}/pulls/${CANDIDATE}" \
                --jq '[.labels[].name | select(. == "agent:pr")] | length > 0' 2>/dev/null) || continue
              if [ "$HAS_LABEL" = "true" ]; then
                PR_NUMBER="$CANDIDATE"
                break
              fi
            done

            if [ -z "${PR_NUMBER:-}" ]; then
              HEAD_SHA="${{ github.event.workflow_run.head_sha }}"
              PR_NUMBER=$(gh api "repos/${{ github.repository }}/commits/${HEAD_SHA}/pulls" \
                --jq '[.[] | select(.labels[].name == "agent:pr") | .number][0] // empty')
            fi

            # Final fallback: find PR by agent:pr label. Needed when:
            #  - Processor dispatch runs use default branch (pull_requests empty)
            #  - Copilot code review / CI head_sha is default branch
            if [ -z "${PR_NUMBER:-}" ]; then
              PR_NUMBER=$(gh api "repos/${{ github.repository }}/issues?labels=agent:pr&state=open&per_page=1" \
                --jq '.[0].number // empty')
            fi
          fi

          if [ -z "${PR_NUMBER:-}" ]; then
            echo "No agent:pr PR found for this event — skipping"
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if ! [[ "$PR_NUMBER" =~ ^[0-9]+$ ]]; then
            echo "::error::Resolved PR number is not a valid integer: ${PR_NUMBER}"
            exit 1
          fi

          echo "pr_number=${PR_NUMBER}" >> "$GITHUB_OUTPUT"
          echo "mode=${MODE}" >> "$GITHUB_OUTPUT"
          echo "skip=false" >> "$GITHUB_OUTPUT"
          ATTEMPT="${{ github.event.inputs.attempt }}"
          echo "attempt=${ATTEMPT:-0}" >> "$GITHUB_OUTPUT"

  react:
    needs: resolve
    if: >-
      github.repository != 'relias-engineering/set-it-free-loop'
      && needs.resolve.result == 'success'
      && needs.resolve.outputs.skip != 'true'
    runs-on: ubuntu-latest
    concurrency:
      group: sfl-reactor-${{ needs.resolve.outputs.pr_number }}
      cancel-in-progress: false
    steps:
      - name: Mint GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ vars.SFL_APP_ID }}
          private-key: ${{ secrets.SFL_APP_PRIVATE_KEY }}

      - name: Check preconditions
        id: check
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          PR_NUMBER: ${{ needs.resolve.outputs.pr_number }}
          EVENT_SHA: ${{ github.event.workflow_run.head_sha || '' }}
          TRIGGERING_WORKFLOW: ${{ github.event.workflow_run.name || '' }}
        run: |
          set -euo pipefail

          PR_DATA=$(gh api "repos/${{ github.repository }}/pulls/${PR_NUMBER}" \
            --jq '{state: .state, labels: [.labels[].name], head_sha: .head.sha, head_ref: .head.ref, body: .body, draft: .draft}')

          STATE=$(echo "$PR_DATA" | jq -r '.state')
          HAS_AGENT_PR=$(echo "$PR_DATA" | jq '[.labels[] | select(. == "agent:pr")] | length > 0')
          HEAD_SHA=$(echo "$PR_DATA" | jq -r '.head_sha')

          if [ "$STATE" != "open" ] || [ "$HAS_AGENT_PR" != "true" ]; then
            echo "PR #${PR_NUMBER} is not an open agent:pr PR — skipping"
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          HAS_ESCALATED=$(echo "$PR_DATA" | jq '[.labels[] | select(. == "agent:human-required" or . == "agent:pause")] | length > 0')
          if [ "$HAS_ESCALATED" = "true" ]; then
            echo "PR #${PR_NUMBER} is already escalated/paused — skipping"
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # For workflow_run events in transition mode, skip if event SHA doesn't
          # match current head (we need the Processor's specific output).
          # Evaluate mode always proceeds — it re-fetches live state from the API.
          MODE="${{ needs.resolve.outputs.mode }}"
          if [ -n "${EVENT_SHA}" ] && [ "${EVENT_SHA}" != "${HEAD_SHA}" ] && [ "${MODE}" = "transition" ] && [ "${TRIGGERING_WORKFLOW}" != "SFL Processor" ]; then
            echo "Stale workflow_run event (event SHA ${EVENT_SHA} != head ${HEAD_SHA}) — skipping transition"
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Extract linked issue number (SFL resolution order)
          PR_BODY=$(echo "$PR_DATA" | jq -r '.body // ""')
          ISSUE_NUMBER=$(echo "$PR_BODY" | grep -oiP '(closes|fixes|resolves)\s+#\K[0-9]+' | head -1 || echo "")
          if [ -z "$ISSUE_NUMBER" ]; then
            ISSUE_NUMBER=$(echo "$PR_BODY" | grep -oP '\*\*Linked Issue\*\*:\s*#\K[0-9]+' | head -1 || echo "")
          fi
          if [ -z "$ISSUE_NUMBER" ]; then
            HEAD_REF=$(echo "$PR_DATA" | jq -r '.head_ref // ""')
            ISSUE_NUMBER=$(echo "$HEAD_REF" | grep -oP '^agent-fix/issue-\K[0-9]+' || echo "")
          fi

          # Count fix-cycles by dispatch comment markers
          CYCLE=$(gh api "repos/${{ github.repository }}/issues/${PR_NUMBER}/comments" \
            --paginate --jq '[.[] | select(.body | contains("<!-- sfl-dispatch:"))] | length')
          CYCLE=${CYCLE:-0}

          # Detect current SFL state label
          CURRENT_STATE=$(echo "$PR_DATA" | jq -r '[.labels[] | select(
            . == "sfl-ready-for-review" or . == "sfl-processing" or
            . == "sfl-needs-work" or . == "sfl-done"
          )][0] // "none"')

          echo "skip=false" >> "$GITHUB_OUTPUT"
          echo "head_sha=${HEAD_SHA}" >> "$GITHUB_OUTPUT"
          echo "issue_number=${ISSUE_NUMBER}" >> "$GITHUB_OUTPUT"
          echo "cycle=${CYCLE}" >> "$GITHUB_OUTPUT"
          echo "current_state=${CURRENT_STATE}" >> "$GITHUB_OUTPUT"
          echo "is_draft=$(echo "$PR_DATA" | jq -r '.draft')" >> "$GITHUB_OUTPUT"

      # ── MODE: TRANSITION (SFL Processor workflow_run completed) ──

      - name: "Transition: handle Processor completion"
        if: >-
          steps.check.outputs.skip != 'true'
          && needs.resolve.outputs.mode == 'transition'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          PR_NUMBER: ${{ needs.resolve.outputs.pr_number }}
          CONCLUSION: ${{ github.event.workflow_run.conclusion }}
        run: |
          set -euo pipefail

          # Always clear the in-flight lock
          gh api --method DELETE \
            "repos/${{ github.repository }}/issues/${PR_NUMBER}/labels/sfl-processing" 2>/dev/null || true

          if [ "$CONCLUSION" = "success" ]; then
            # Processor succeeded — move to review state
            gh api --method DELETE \
              "repos/${{ github.repository }}/issues/${PR_NUMBER}/labels/sfl-needs-work" 2>/dev/null || true
            gh api --method POST "repos/${{ github.repository }}/issues/${PR_NUMBER}/labels" \
              -f "labels[]=sfl-ready-for-review" > /dev/null
            echo "Processor succeeded — PR #${PR_NUMBER} → sfl-ready-for-review"
          else
            # Processor failed — ensure needs-work is set
            gh api --method POST "repos/${{ github.repository }}/issues/${PR_NUMBER}/labels" \
              -f "labels[]=sfl-needs-work" > /dev/null 2>&1 || true
            echo "::warning::Processor did not succeed (${CONCLUSION}) — PR #${PR_NUMBER} → sfl-needs-work"
          fi

      - name: "Transition: request Copilot review"
        if: >-
          steps.check.outputs.skip != 'true'
          && needs.resolve.outputs.mode == 'transition'
          && github.event.workflow_run.conclusion == 'success'
        env:
          GH_TOKEN: ${{ secrets.GH_AW_GITHUB_TOKEN }}
          PR_NUMBER: ${{ needs.resolve.outputs.pr_number }}
        run: |
          # GraphQL requestReviews requires a user PAT with repo access.
          # GITHUB_TOKEN, App tokens, and COPILOT_GITHUB_TOKEN all silently
          # fail or lack repo access. GH_AW_GITHUB_TOKEN (Integrations-relias
          # PAT) has confirmed write access to this repo.
          gh pr edit "${PR_NUMBER}" \
            --repo "${{ github.repository }}" \
            --add-reviewer "copilot-pull-request-reviewer" 2>&1 || \
            echo "::warning::Could not request Copilot review"

      - name: "Transition: delayed evaluate"
        if: >-
          steps.check.outputs.skip != 'true'
          && needs.resolve.outputs.mode == 'transition'
          && github.event.workflow_run.conclusion == 'success'
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ needs.resolve.outputs.pr_number }}
        run: |
          # Bridge the gap where pull_request_review events from Copilot
          # get blocked by org actor-approval policy. Sleep to give Copilot
          # time to review, then dispatch evaluate via workflow_dispatch
          # (which is NOT subject to actor-approval blocking).
          echo "Waiting 3 minutes for Copilot to complete review..."
          sleep 180
          gh workflow run sfl-review-reactor.yml \
            --repo "${{ github.repository }}" \
            -f pr-number="${PR_NUMBER}" \
            -f attempt="0"
          echo "Dispatched delayed evaluate for PR #${PR_NUMBER}"

      # ── MODE: EVALUATE (pull_request_review / workflow_run:CI / dispatch) ──

      - name: "Evaluate: check PR state"
        if: >-
          steps.check.outputs.skip != 'true'
          && needs.resolve.outputs.mode == 'evaluate'
        id: evaluate
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          COPILOT_PAT: ${{ secrets.GH_AW_GITHUB_TOKEN }}
          PR_NUMBER: ${{ needs.resolve.outputs.pr_number }}
          HEAD_SHA: ${{ steps.check.outputs.head_sha }}
          CYCLE: ${{ steps.check.outputs.cycle }}
        run: |
          set -euo pipefail

          # Count unresolved, non-outdated review threads (paginated)
          CURSOR=""
          ALL_THREAD_NODES="[]"
          while true; do
            AFTER_ARG=""
            if [ -n "$CURSOR" ]; then
              AFTER_ARG="-f after=${CURSOR}"
            fi
            THREAD_DATA=$(gh api graphql -f query='
              query($owner: String!, $repo: String!, $pr: Int!, $after: String) {
                repository(owner: $owner, name: $repo) {
                  pullRequest(number: $pr) {
                    reviewThreads(first: 100, after: $after) {
                      totalCount
                      pageInfo { hasNextPage endCursor }
                      nodes { isResolved isOutdated }
                    }
                  }
                }
              }' -f owner="${{ github.repository_owner }}" \
                 -f repo="${{ github.event.repository.name }}" \
                 -F pr="${PR_NUMBER}" \
                 ${AFTER_ARG})

            PAGE_NODES=$(echo "$THREAD_DATA" | jq '[.data.repository.pullRequest.reviewThreads.nodes[]]')
            ALL_THREAD_NODES=$(echo "$ALL_THREAD_NODES" "$PAGE_NODES" | jq -s '.[0] + .[1]')

            HAS_NEXT=$(echo "$THREAD_DATA" | jq -r '.data.repository.pullRequest.reviewThreads.pageInfo.hasNextPage')
            if [ "$HAS_NEXT" != "true" ]; then break; fi
            CURSOR=$(echo "$THREAD_DATA" | jq -r '.data.repository.pullRequest.reviewThreads.pageInfo.endCursor')
          done

          UNRESOLVED=$(echo "$ALL_THREAD_NODES" | jq '[.[] | select(.isResolved == false and .isOutdated == false)] | length')

          # Check CI status (exclude this workflow's own check run)
          CHECK_RUNS=$(gh api "repos/${{ github.repository }}/commits/${HEAD_SHA}/check-runs" \
            --paginate --jq '.check_runs[]' | jq -s '[.[] | select(.name != "react")] | {
              total: length,
              success: [.[] | select(.conclusion == "success" or .conclusion == "skipped" or .conclusion == "neutral")] | length,
              failure: [.[] | select(.conclusion == "failure" or .conclusion == "cancelled" or .conclusion == "timed_out" or .conclusion == "action_required" or .conclusion == "startup_failure" or .conclusion == "stale")] | length,
              pending: [.[] | select(.status != "completed")] | length
            }')

          PENDING=$(echo "$CHECK_RUNS" | jq '.pending')
          FAILURES=$(echo "$CHECK_RUNS" | jq '.failure')
          TOTAL=$(echo "$CHECK_RUNS" | jq '.total')

          # Check if Copilot has reviewed the current head SHA.
          # Must be from copilot-pull-request-reviewer[bot] specifically —
          # the reactor's own bot comments must NOT satisfy this gate.
          REVIEWS_FOR_HEAD=$(gh api "repos/${{ github.repository }}/pulls/${PR_NUMBER}/reviews" \
            --paginate --jq '.[]' | jq -s --arg sha "${HEAD_SHA}" \
            '[.[] | select(.commit_id == $sha)]')

          HAS_REVIEW=$(echo "$REVIEWS_FOR_HEAD" | jq \
            '[.[] | select(.user.login == "copilot-pull-request-reviewer[bot]")] | length > 0')
          CHANGES_REQUESTED=$(echo "$REVIEWS_FOR_HEAD" | jq '
            [.[] | select(.state == "CHANGES_REQUESTED")]
            | group_by(.user.login)
            | map(sort_by(.submitted_at) | last)
            | [.[] | select(.state == "CHANGES_REQUESTED")]
            | length > 0')

          # Detect clean Copilot review: latest Copilot review for this HEAD
          # generated zero inline comments. When this happens, remaining
          # unresolved threads are stale from prior review cycles (Copilot
          # re-reviewed the fixed code and found no new issues).
          CLEAN_COPILOT_REVIEW="false"
          LATEST_COPILOT_REVIEW_ID=$(echo "$REVIEWS_FOR_HEAD" | jq -r '
            [.[] | select(.user.login == "copilot-pull-request-reviewer[bot]")]
            | sort_by(.submitted_at) | last | .id // empty')
          if [ -n "$LATEST_COPILOT_REVIEW_ID" ]; then
            REVIEW_COMMENT_COUNT=$(gh api \
              "repos/${{ github.repository }}/pulls/${PR_NUMBER}/reviews/${LATEST_COPILOT_REVIEW_ID}/comments" \
              --jq 'length' 2>/dev/null || echo "-1")
            if [ "${REVIEW_COMMENT_COUNT}" -eq 0 ]; then
              CLEAN_COPILOT_REVIEW="true"
            fi
          fi

          # Decision logic
          DECISION=""
          REASON=""

          if [ "$PENDING" -gt 0 ]; then
            DECISION="wait"
            REASON="wait (${PENDING} checks still pending)"
          elif [ "$TOTAL" -eq 0 ]; then
            DECISION="wait"
            REASON="wait (no check runs found yet)"
          elif [ "$FAILURES" -gt 0 ]; then
            DECISION="needs-work"
            REASON="needs-work (failures=${FAILURES})"
          elif [ "$CHANGES_REQUESTED" = "true" ]; then
            DECISION="needs-work"
            REASON="needs-work (CHANGES_REQUESTED review on head ${HEAD_SHA:0:7})"
          elif [ "$HAS_REVIEW" != "true" ]; then
            # Self-healing: request Copilot review if missing
            ALREADY_REQUESTED=$(gh api "repos/${{ github.repository }}/pulls/${PR_NUMBER}/requested_reviewers" \
              --jq '[.users[].login | select(. == "Copilot")] | length > 0' 2>/dev/null || echo "false")
            if [ "$ALREADY_REQUESTED" != "true" ]; then
              # GraphQL requestReviews requires a user PAT — GITHUB_TOKEN and
              # App tokens silently succeed but never actually add Copilot.
              GH_TOKEN="${COPILOT_PAT}" gh pr edit "${PR_NUMBER}" \
                --repo "${{ github.repository }}" \
                --add-reviewer "copilot-pull-request-reviewer" 2>&1 || \
                echo "::warning::Could not request Copilot review"
            fi
            DECISION="wait"
            REASON="wait (no review for head ${HEAD_SHA:0:7} — requested Copilot review)"
          elif [ "${UNRESOLVED:-0}" -gt 0 ]; then
            if [ "$CLEAN_COPILOT_REVIEW" = "true" ]; then
              DECISION="done"
              REASON="done (clean Copilot review — ${UNRESOLVED} stale thread(s) from prior cycles)"
            else
              DECISION="needs-work"
              REASON="needs-work (threads=${UNRESOLVED})"
            fi
          else
            DECISION="done"
            REASON="done (threads=0, checks pass, review exists)"
          fi

          echo "decision=${DECISION}" >> "$GITHUB_OUTPUT"
          echo "Decision: ${REASON}"

      - name: "Evaluate: promote to sfl-done"
        if: >-
          steps.check.outputs.skip != 'true'
          && needs.resolve.outputs.mode == 'evaluate'
          && steps.evaluate.outputs.decision == 'done'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          PR_NUMBER: ${{ needs.resolve.outputs.pr_number }}
        run: |
          set -euo pipefail
          gh api --method POST "repos/${{ github.repository }}/issues/${PR_NUMBER}/labels" \
            -f "labels[]=sfl-done" > /dev/null
          gh api --method DELETE \
            "repos/${{ github.repository }}/issues/${PR_NUMBER}/labels/sfl-ready-for-review" 2>/dev/null || true
          gh api --method DELETE \
            "repos/${{ github.repository }}/issues/${PR_NUMBER}/labels/sfl-processing" 2>/dev/null || true
          echo "Promoted PR #${PR_NUMBER} — sfl-done"

      - name: "Evaluate: mark sfl-needs-work"
        if: >-
          steps.check.outputs.skip != 'true'
          && needs.resolve.outputs.mode == 'evaluate'
          && steps.evaluate.outputs.decision == 'needs-work'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          PR_NUMBER: ${{ needs.resolve.outputs.pr_number }}
        run: |
          set -euo pipefail
          gh api --method POST "repos/${{ github.repository }}/issues/${PR_NUMBER}/labels" \
            -f "labels[]=sfl-needs-work" > /dev/null
          gh api --method DELETE \
            "repos/${{ github.repository }}/issues/${PR_NUMBER}/labels/sfl-ready-for-review" 2>/dev/null || true
          echo "PR #${PR_NUMBER} needs work — added sfl-needs-work"

      - name: "Evaluate: retry on wait"
        if: >-
          steps.check.outputs.skip != 'true'
          && needs.resolve.outputs.mode == 'evaluate'
          && steps.evaluate.outputs.decision == 'wait'
          && github.event_name == 'workflow_dispatch'
          && fromJSON(needs.resolve.outputs.attempt) < 2
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ needs.resolve.outputs.pr_number }}
          ATTEMPT: ${{ needs.resolve.outputs.attempt }}
        run: |
          NEXT=$((ATTEMPT + 1))
          echo "Evaluate returned wait — scheduling retry ${NEXT}/2 in 2 minutes..."
          sleep 120
          gh workflow run sfl-review-reactor.yml \
            --repo "${{ github.repository }}" \
            -f pr-number="${PR_NUMBER}" \
            -f attempt="${NEXT}"
          echo "Dispatched retry evaluate for PR #${PR_NUMBER} (attempt ${NEXT})"

      # ── MODE: DISPATCH (sfl-needs-work labeled OR evaluate→needs-work) ──
      # Evaluate dispatches directly — bot-authored label events may not
      # trigger new workflow runs (GitHub Actions actor-approval policy).

      - name: "Dispatch: check guard and escalation"
        if: >-
          steps.check.outputs.skip != 'true'
          && (needs.resolve.outputs.mode == 'dispatch'
              || (needs.resolve.outputs.mode == 'evaluate'
                  && steps.evaluate.outputs.decision == 'needs-work'))
        id: guard
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          PR_NUMBER: ${{ needs.resolve.outputs.pr_number }}
          CYCLE: ${{ steps.check.outputs.cycle }}
          CURRENT_STATE: ${{ steps.check.outputs.current_state }}
        run: |
          set -euo pipefail

          # Cycle cap — escalate to human
          if [ "$CYCLE" -ge 20 ]; then
            echo "::warning::Cycle cap reached (${CYCLE}) — escalating to human"
            gh api --method POST "repos/${{ github.repository }}/issues/${PR_NUMBER}/labels" \
              -f "labels[]=agent:human-required" > /dev/null
            gh api --method DELETE \
              "repos/${{ github.repository }}/issues/${PR_NUMBER}/labels/sfl-needs-work" 2>/dev/null || true
            gh api --method DELETE \
              "repos/${{ github.repository }}/issues/${PR_NUMBER}/labels/sfl-processing" 2>/dev/null || true
            gh api --method POST "repos/${{ github.repository }}/issues/${PR_NUMBER}/comments" \
              -f body="⚠️ **SFL Review Reactor**: Fix-cycle cap reached (${CYCLE} attempts). Escalating to human review." > /dev/null
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # In-flight guard — prevent duplicate dispatches
          if [ "$CURRENT_STATE" = "sfl-processing" ]; then
            echo "Processor already running (sfl-processing) — skipping duplicate dispatch"
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "skip=false" >> "$GITHUB_OUTPUT"

      - name: "Dispatch: send to Processor"
        if: >-
          steps.check.outputs.skip != 'true'
          && (needs.resolve.outputs.mode == 'dispatch'
              || (needs.resolve.outputs.mode == 'evaluate'
                  && steps.evaluate.outputs.decision == 'needs-work'))
          && steps.guard.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          PR_NUMBER: ${{ needs.resolve.outputs.pr_number }}
          ISSUE_NUMBER: ${{ steps.check.outputs.issue_number }}
          CYCLE: ${{ steps.check.outputs.cycle }}
        run: |
          set -euo pipefail

          if [ -z "${ISSUE_NUMBER}" ]; then
            echo "::error::Cannot dispatch fix-cycle: no linked issue found"
            exit 1
          fi

          NEXT_CYCLE=$((CYCLE + 1))
          DISPATCH_TS=$(date -u '+%Y-%m-%dT%H:%M:%SZ')

          # Set in-flight lock BEFORE dispatching
          gh label create "sfl-processing" \
            --repo "${{ github.repository }}" \
            --description "SFL Processor is running" \
            --color "FBCA04" --force 2>/dev/null || true
          gh api --method POST "repos/${{ github.repository }}/issues/${PR_NUMBER}/labels" \
            -f "labels[]=sfl-processing" > /dev/null

          # Dispatch Processor
          gh workflow run sfl-processor.lock.yml \
            --repo "${{ github.repository }}" \
            -f issue-number="${ISSUE_NUMBER}" \
            -f pr-number="${PR_NUMBER}"

          # Clean up consumed state label
          gh api --method DELETE \
            "repos/${{ github.repository }}/issues/${PR_NUMBER}/labels/sfl-needs-work" 2>/dev/null || true

          gh api --method POST "repos/${{ github.repository }}/issues/${PR_NUMBER}/comments" \
            -f body="🔄 **SFL Review Reactor**: Dispatched fix-cycle ${NEXT_CYCLE} (reactor run [${{ github.run_id }}](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})). <!-- sfl-dispatch:${{ github.run_id }}-${NEXT_CYCLE}:${DISPATCH_TS} -->" \
            > /dev/null

          echo "Dispatched fix-cycle ${NEXT_CYCLE} for PR #${PR_NUMBER} (issue #${ISSUE_NUMBER})"
