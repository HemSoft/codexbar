name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install markdownlint-cli
        run: npm ci

      - name: Markdown Lint
        run: npm run lint:md

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --verbosity minimal

      - name: Format Check
        run: dotnet format --verify-no-changes --verbosity minimal

      - name: Test
        run: dotnet test --no-build --verbosity minimal

      - name: Restore Tools
        run: dotnet tool restore

      - name: Mutation Testing (Core)
        working-directory: src/CodexBar.Core.Tests
        run: dotnet stryker --verbosity minimal

      - name: Security Audit
        shell: pwsh
        run: |
          $json = dotnet list package --vulnerable --include-transitive --format json
          $report = $json | ConvertFrom-Json
          $hasVulnerabilities = $false

          foreach ($project in @($report.projects)) {
            if (-not $project.frameworks) { continue }
            foreach ($framework in @($project.frameworks)) {
              $packages = @($framework.topLevelPackages) + @($framework.transitivePackages)
              foreach ($package in @($packages)) {
                if ($package -and @($package.vulnerabilities).Count -gt 0) {
                  $hasVulnerabilities = $true
                }
              }
            }
          }

          if ($hasVulnerabilities) {
            Write-Error "Vulnerable packages detected!"
            exit 1
          }
